<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Desert Rose Capital — Quantitative Trading Firm</title>
  <meta name="description" content="Desert Rose Capital is a quantitative trading firm based in Amsterdam, founded by former researchers and developers, applying mathematical and statistical tools to trading in global financial markets. Trading live on CME Globex via Interactive Brokers.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://desertrose.capital/">

  <!-- Favicon: terracotta monogram -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%238a5b41'/%3E%3Ctext x='16' y='22' font-size='16' font-family='Georgia,serif' font-weight='500' fill='%23F6F2EA' text-anchor='middle'%3EDR%3C/text%3E%3C/svg%3E">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Desert Rose Capital — Quantitative Trading Firm">
  <meta property="og:description" content="A quantitative trading firm based in Amsterdam, applying mathematical and statistical tools to trading in global financial markets.">
  <meta property="og:url" content="https://desertrose.capital/">
  <meta name="twitter:card" content="summary">

  <!-- Structured data: helps Google render a richer, more credible result -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Desert Rose Capital",
    "description": "Quantitative trading firm based in Amsterdam, applying mathematical and statistical tools to trading in global financial markets.",
    "url": "https://desertrose.capital/",
    "email": "info@desertrose.capital",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Amsterdam",
      "addressCountry": "NL"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Spectral:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #F6F2EA;
      --ink:       #1C1814;
      --muted:     #6B6359;
      --line:      rgba(28,24,20,0.13);
      --accent-2:  oklch(0.50 0.11 40);
      --dot:       oklch(0.60 0.10 40);
    }
    @supports not (color: oklch(0.5 0.1 40)) {
      :root { --accent-2:#8a5b41; --dot:#a87455; }
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
    body {
      background:var(--bg);
      color:var(--ink);
      font-family:'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-feature-settings:"liga" 1, "kern" 1;
    }
    a { color:inherit; }
    ::selection { background:rgba(138,91,65,0.18); color:var(--ink); }
    :focus-visible { outline:2px solid var(--dot); outline-offset:2px; }

    /* ---- live status badge (top-right corner) ---- */
    .badge {
      position:fixed; top:22px; right:24px; z-index:10;
      display:inline-flex; align-items:center; gap:9px;
      border:1px solid rgba(28,24,20,0.16); border-radius:999px;
      background:rgba(246,242,234,0.82);
      -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
      padding:7px 14px;
      font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; color:#3a342d;
    }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--dot); animation:pulse 3.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.55; transform:scale(0.84); } }
    @media (prefers-reduced-motion: reduce) { .dot { animation:none; } }

    .wrap {
      height:100vh;
      height:100dvh;
      max-width:680px;
      margin:0 auto;
      padding:52px clamp(24px, 6vw, 40px) 36px;
      display:flex;
      flex-direction:column;
      text-align:center;
    }

    /* ---- hero (one centered composition) ---- */
    .hero {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .identity {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .brand {
      font-family:'Spectral', serif; font-weight:500;
      font-size:clamp(36px, 8vw, 56px); letter-spacing:-0.02em; line-height:1.0;
      text-wrap:balance;
    }
    .tagline {
      margin-top:18px; font-size:12px; font-weight:600;
      letter-spacing:0.18em; text-transform:uppercase; color:var(--muted);
    }
    .accent-rule {
      width:40px; height:2px; margin:26px auto 0;
      background:var(--accent-2); border-radius:2px; opacity:0.9;
    }
    .statement {
      font-family:'Spectral', serif; font-weight:400;
      font-size:clamp(18px, 2.3vw, 21px); line-height:1.58;
      color:var(--ink); text-wrap:balance;
      max-width:48ch; margin:24px auto 0;
    }

    /* ---- contact form (line-ruled, old-school) ---- */
    .contact { margin:0 auto; width:100%; max-width:430px; }
    .contact-label {
      font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.14em;
      text-transform:uppercase; color:var(--muted); margin-bottom:22px;
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:26px; }
    .form-field { text-align:left; }
    .form-field--msg { margin-top:18px; }
    .form-field input,
    .form-field textarea {
      width:100%; font-family:'Hanken Grotesk', -apple-system, sans-serif;
      font-size:15px; line-height:1.5; color:var(--ink);
      background:transparent; border:none;
      border-bottom:1px solid rgba(28,24,20,0.28); border-radius:0;
      padding:7px 1px; transition:border-color 0.15s ease;
    }
    .form-field input::placeholder,
    .form-field textarea::placeholder { color:var(--muted); }
    .form-field input:focus,
    .form-field textarea:focus {
      outline:none; border-bottom-color:var(--dot);
    }
    .form-field textarea { resize:none; min-height:150px; }
    .hp { position:absolute; left:-9999px; width:1px; height:1px; opacity:0; }
    .submit-row { display:flex; margin-top:26px; }
    .submit-btn {
      cursor:pointer; width:100%;
      font-family:'IBM Plex Mono', monospace; font-size:12px;
      letter-spacing:0.1em; text-transform:uppercase;
      color:var(--bg); background:var(--accent-2);
      background:color-mix(in oklab, var(--accent-2) 90%, var(--bg));
      border:none; border-radius:4px; padding:13px 32px;
      transition:opacity 0.15s ease;
    }
    .submit-btn:hover { opacity:0.88; }
    .submit-btn:disabled { opacity:0.5; cursor:default; }
    .form-status {
      margin-top:14px; font-size:13px; line-height:1.5;
      color:var(--muted); min-height:1.2em; text-align:center;
    }
    .form-status.error { color:var(--accent-2); }

    /* ---- footer ---- */
    .foot {
      margin-top:auto; padding-top:18px; border-top:1px solid var(--line);
      display:flex; flex-direction:row; justify-content:space-between; align-items:center;
      gap:16px; width:100%;
    }
    .foot-email {
      font-family:'Spectral', serif; font-size:15px; color:var(--ink);
      text-decoration:none; border-bottom:1px solid var(--dot); padding-bottom:1px;
      transition:color 0.15s ease; white-space:nowrap;
    }
    .foot-email:hover { color:var(--accent-2); }
    .foot-meta {
      font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.04em;
      color:var(--muted); line-height:1.5; white-space:nowrap;
    }

    @media (max-width: 600px) {
      .badge { top:16px; right:16px; }
      .wrap { padding-top:64px; }
      .foot { display:flex; flex-direction:column; gap:9px; text-align:center; }
      .foot-email, .foot-meta { text-align:center; }
    }
    /* safety net: if the viewport is too short to fit everything, allow scroll instead of clipping */
    @media (max-width: 600px), (max-height: 660px) {
      .wrap { height:auto; min-height:100vh; min-height:100dvh; }
    }
  </style>
</head>
<body>

  <div class="badge"><span class="dot" aria-hidden="true"></span><span>LIVE · CME GLOBEX</span></div>

  <div class="wrap">

    <main class="hero">
      <div class="identity">
      <h1 class="brand">Desert Rose Capital</h1>
      <div class="accent-rule" aria-hidden="true"></div>

      <p class="statement">Desert Rose is a quantitative trading firm founded by former researchers and developers. We apply mathematical and statistical tools to trading in global financial markets.</p>

      </div>

      <div class="contact">
        <div class="contact-label">Get in touch</div>
        <form id="contact-form" novalidate>
          <div class="form-row">
            <div class="form-field">
              <input id="f-name" type="text" name="name" placeholder="Name" aria-label="Name" autocomplete="name" required>
            </div>
            <div class="form-field">
              <input id="f-email" type="email" name="email" placeholder="Email" aria-label="Email" autocomplete="email" required>
            </div>
          </div>
          <!-- honeypot: bots fill this; humans never see it -->
          <input type="checkbox" name="botcheck" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
          <div class="submit-row">
            <button type="submit" class="submit-btn">Send</button>
          </div>
          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <footer class="foot">
      <a class="foot-email" href="mailto:info@desertrose.capital">info@desertrose.capital</a>
      <div class="foot-meta">Amsterdam</div>
    </footer>

  </div>

  <script>
    (function () {
      // Web3Forms access key — submissions are emailed to steve@desertrose.capital:
      var ACCESS_KEY = "509fe0c1-478e-4a1b-a3f9-606daf6280c2";

      var form   = document.getElementById("contact-form");
      var status = document.getElementById("form-status");
      var btn    = form.querySelector(".submit-btn");
      var val    = function (n) { return form.querySelector('[name="' + n + '"]'); };

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        status.className = "form-status";

        if (ACCESS_KEY === "YOUR_WEB3FORMS_ACCESS_KEY") {
          status.className = "form-status error";
          status.textContent = "Form not configured yet — please email us directly.";
          return;
        }

        var payload = {
          access_key: ACCESS_KEY,
          subject: "New enquiry — desertrose.capital",
          from_name: "Desert Rose website",
          name:    val("name").value,
          email:   val("email").value,
          message: "Enquiry via desertrose.capital",
          botcheck: val("botcheck").checked
        };

        btn.disabled = true;
        status.textContent = "Sending…";

        fetch("https://api.web3forms.com/submit", {
          method:  "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body:    JSON.stringify(payload)
        })
          .then(function (r) { return r.json(); })
          .then(function (res) {
            if (res.success) {
              form.reset();
              status.textContent = "Thanks — we'll be in touch shortly.";
            } else {
              status.className = "form-status error";
              status.textContent = res.message || "Something went wrong — please email us directly.";
            }
          })
          .catch(function () {
            status.className = "form-status error";
            status.textContent = "Something went wrong — please email us directly.";
          })
          .finally(function () { btn.disabled = false; });
      });
    })();
  </script>

</body>
</html>
